<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="canonical" href="https://www.fokelworks.com/" />

    <!-- Primary SEO -->
    <title>Fokel Creative Agency | Branding, Strategy & Digital Growth Studio</title>
    <meta name="description" content="Fokel is a modern creative agency helping startups and businesses build powerful brand identities. We combine strategic thinking, bold design, and digital innovation to create impactful experiences that drive measurable growth and long-term success." />
    <meta name="author" content="Fokel Creative Agency" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.fokelworks.com/" />
    <meta property="og:title" content="Fokel Creative Agency | Branding & Digital Strategy Experts" />
    <meta property="og:description" content="At Fokel, we craft bold branding, strategic design, and digital experiences that elevate businesses above the competition. We turn ideas into powerful market presence." />
    <meta property="og:image" content="https://www.fokelworks.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fokel Creative Agency | Branding & Digital Strategy Experts" />
    <meta name="twitter:description" content="We help brands grow through strategy, creativity, and digital excellence. Discover how Fokel transforms vision into impact." />
    <meta name="twitter:image" content="https://www.fokelworks.com/og-image.jpg" />

    <!-- Structured Data for Google (Very Important) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fokel Creative Agency",
      "alternateName": "Fokel",
      "url": "https://www.fokelworks.com/",
      "logo": "https://www.fokelworks.com/favicon.png",
      "sameAs": [
        "https://instagram.com/fokelworks",
        "https://www.linkedin.com/company/fokelworks",
        "https://facebook.com/fokelworks"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
